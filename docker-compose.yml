name: morgans-hope

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ct-service:
    build:
      context: ./ai/ct_service
      dockerfile: Dockerfile
    ports:
      - "8000:7860"
    environment:
      - CT_MODEL_PATH=/app/model.pt
    volumes:
      - ct_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  xray-service:
    build:
      context: ./ai/xray_service
      dockerfile: Dockerfile
    ports:
      - "8001:7860"
    volumes:
      - xray_model_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7860/health')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - USE_SQLITE=1
      - JWT_SECRET=dev_jwt_secret_min_32_chars_xxxxxxxxxxxx
      - REFRESH_SECRET=dev_refresh_secret_min_32_chars_xxxxxx
      - REDIS_URL=redis://redis:6379
      - CT_SERVICE_URL=http://ct-service:7860
      - XRAY_SERVICE_URL=http://xray-service:7860
      - FRONTEND_URL=http://localhost:3001
      - UPLOAD_DIR=/app/uploads
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: ["npm", "run", "worker:watch"]
    environment:
      - NODE_ENV=development
      - USE_SQLITE=1
      - JWT_SECRET=dev_jwt_secret_min_32_chars_xxxxxxxxxxxx
      - REFRESH_SECRET=dev_refresh_secret_min_32_chars_xxxxxx
      - REDIS_URL=redis://redis:6379
      - CT_SERVICE_URL=http://ct-service:7860
      - XRAY_SERVICE_URL=http://xray-service:7860
      - UPLOAD_DIR=/app/uploads
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME:-}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY:-}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET:-}
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
      - /app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:3000/api
      - VITE_GOOGLE_AUTH_URL=http://localhost:3000/api/auth/google
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - /app/node_modules
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  ct_model_cache:
  xray_model_cache:
